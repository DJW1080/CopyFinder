name: CopyFinder Windows Desktop

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

env:
  Solution_Name: CopyFinder.sln
  Publish_Script: .\publish.ps1
  Runtime: win-x64
  Configuration: Release

jobs:
  build-publish:
    name: Build and Publish
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        shell: pwsh
        run: dotnet restore $env:Solution_Name

      - name: Build solution
        shell: pwsh
        run: |
          dotnet build `
            $env:Solution_Name `
            --configuration $env:Configuration `
            --no-restore

      - name: Publish standalone zip
        shell: pwsh
        run: |
          & $env:Publish_Script `
            -Configuration $env:Configuration `
            -Runtime $env:Runtime

      - name: Verify checksum
        shell: pwsh
        run: |
          $zip = Get-ChildItem .\publish -Filter "*.zip" -File | Select-Object -First 1

          if (-not $zip)
          {
              throw "No zip file created."
          }

          $hashFile = "$($zip.FullName).sha256.txt"

          if (-not (Test-Path $hashFile))
          {
              throw "Missing checksum file."
          }

          $expected = (Get-Content $hashFile).Split(" ")[0]
          $actual = (Get-FileHash $zip.FullName -Algorithm SHA256).Hash

          if ($expected -ne $actual)
          {
              throw "Checksum mismatch."
          }

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: CopyFinder-Standalone
          path: |
            publish/*.zip
            publish/*.zip.sha256.txt
            