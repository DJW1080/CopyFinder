name: CopyFinder Windows Desktop

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

env:
  Solution_Name: CopyFinder.sln
  Project_Path: CopyFinder.csproj
  Test_Project_Path: Tests\CopyFinder.Tests.csproj
  Publish_Script: .\publish.ps1
  Runtime: win-x64
  Configuration: Release

jobs:
  build-test-publish:
    name: Build, Test, and Publish (Release)
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # .NET SDK
      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # Environment info (useful for debugging runners)
      - name: Show .NET environment
        shell: pwsh
        run: dotnet --info

      # Restore
      - name: Restore dependencies
        shell: pwsh
        run: dotnet restore $env:Solution_Name

      # Build
      - name: Build solution (Release)
        shell: pwsh
        run: dotnet build $env:Solution_Name --configuration $env:Configuration --no-restore -v:minimal

      # Create deterministic test fixture
      - name: Create bounded scan fixture
        shell: pwsh
        run: |
          $fixtureRoot = Join-Path $env:RUNNER_TEMP "CopyFinderScanFixture"

          if (Test-Path -LiteralPath $fixtureRoot) {
            Remove-Item -LiteralPath $fixtureRoot -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path (Join-Path $fixtureRoot "A") | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $fixtureRoot "B") | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $fixtureRoot "Unique") | Out-Null

          "bounded duplicate content" | Set-Content -LiteralPath (Join-Path $fixtureRoot "A\duplicate-a.txt") -Encoding UTF8
          "bounded duplicate content" | Set-Content -LiteralPath (Join-Path $fixtureRoot "B\duplicate-b.txt") -Encoding UTF8
          "unique workflow content" | Set-Content -LiteralPath (Join-Path $fixtureRoot "Unique\unique.txt") -Encoding UTF8

          "COPYFINDER_WORKFLOW_SCAN_ROOT=$fixtureRoot" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          Write-Host "Fixture created at: $fixtureRoot"

      # NEW: show fixture contents (debug visibility)
      - name: Show test fixture contents
        shell: pwsh
        run: |
          Write-Host "COPYFINDER_WORKFLOW_SCAN_ROOT=$env:COPYFINDER_WORKFLOW_SCAN_ROOT"

          if (-not (Test-Path -LiteralPath $env:COPYFINDER_WORKFLOW_SCAN_ROOT)) {
            throw "Fixture root does not exist."
          }

          Get-ChildItem -LiteralPath $env:COPYFINDER_WORKFLOW_SCAN_ROOT -Recurse |
            Select-Object FullName, Length |
            Format-Table -AutoSize

      # FIXED: proper test execution
      - name: Run regression harness
        shell: pwsh
        timeout-minutes: 5
        run: |
          dotnet run `
            --project $env:Test_Project_Path `
            --configuration $env:Configuration `
            --no-build

      # Publish
      - name: Publish standalone zip
        shell: pwsh
        run: '& $env:Publish_Script -Configuration Release -Runtime $env:Runtime'

      # Verify checksum
      - name: Verify standalone zip checksum
        shell: pwsh
        run: |
          $zip = Get-ChildItem -LiteralPath .\publish -Filter "CopyFinder-v*-$env:Runtime-Standalone.zip" -File | Select-Object -First 1
          if (-not $zip) {
            throw "Standalone zip was not created."
          }

          $hashPath = "$($zip.FullName).sha256.txt"
          if (-not (Test-Path -LiteralPath $hashPath)) {
            throw "SHA-256 sidecar was not created: $hashPath"
          }

          $expected = (Get-Content -LiteralPath $hashPath).Split(" ")[0]
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $zip.FullName).Hash

          if ($actual -ne $expected) {
            throw "Checksum mismatch. Expected $expected but got $actual."
          }

          Write-Host "Verified $($zip.Name): $actual"

      # Upload artifact
      - name: Upload standalone release zip
        uses: actions/upload-artifact@v4
        with:
          name: CopyFinder-Standalone
          path: |
            publish/*.zip
            publish/*.zip.sha256.txt
          if-no-files-found: error
